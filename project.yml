name: Breaker
options:
  bundleIdPrefix: com.breaker
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.0"

targets:
  Breaker:
    type: application
    platform: macOS
    sources:
      - Breaker
    settings:
      base:
        INFOPLIST_FILE: Breaker/Info.plist
        CODE_SIGN_ENTITLEMENTS: Breaker/Breaker.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.breaker.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
